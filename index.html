<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU budgeting Tool</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./Image/Tab-logo.png">
    <link rel="stylesheet" href="./Css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"rel="stylesheet">
</head>
<body>
    <main>
        <h1>Ready to Wise-Up?</h1>
    <h2>Tell us more about yourself to calculate your future.</h2>
<form>
<section id="firstInput">
    <label for="Graduation">First Name</label>
    <input  class="placeholder" placeholder="First Name" type="text" required>
    <label for="Graduation">Choose your career</label>
    <select  class="placeholder" name="career-drop" required id="careerDrop">
        <option value="" disabled selected>Your career here</option>
    </select>
    <label for="Graduation">Target Graduation Year</label>
    <input class="placeholder" placeholder="Target Graduation Year" type="number" min="1991" max="2026" required>
</section>
    
    <button id="CalculateButton"><a href="dashboard.html"> Calculate My Future</a></button>
</form>
</main>
    
<script src="./JavaScript/Index.js" defer></script>
</body>
</html>
